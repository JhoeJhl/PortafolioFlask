<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | Joel Pinto</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-950 text-slate-200 antialiased flex flex-col min-h-screen selection:bg-cyan-500 selection:text-white">

    <nav class="fixed w-full z-50 transition-all duration-500" id="navbar">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-24">
                <div class="flex-shrink-0">
                    <a href="/" class="group flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/20 group-hover:scale-110 transition-transform">
                            <span class="text-white font-bold text-lg tracking-tighter">JP</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-white font-bold text-lg tracking-tight leading-none">Joel Pinto</span>
                            <span class="text-cyan-400/80 font-medium text-[10px] uppercase tracking-[0.2em] leading-tight">Desarrollador de Software</span>
                        </div>
                    </a>
                </div>
                
                <div class="hidden md:flex items-center gap-10">
                    <a href="/" class="text-sm font-semibold text-slate-300 hover:text-white transition-colors relative group py-2">
                        Inicio
                        <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-cyan-400 transition-all duration-300 group-hover:w-full"></span>
                    </a>
                    <a href="/contacto" class="inline-flex items-center justify-center px-6 py-3 bg-white text-slate-900 text-sm font-bold rounded-xl hover:bg-cyan-400 transition-all shadow-xl shadow-white/5 active:scale-95">
                        Contacto
                    </a>
                </div>

                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-slate-300 hover:text-white focus:outline-none p-2 rounded-lg hover:bg-white/5">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-slate-950/95 backdrop-blur-xl border-b border-white/10 absolute w-full shadow-2xl overflow-hidden">
            <div class="px-6 pt-4 pb-10 space-y-4">
                <a href="/" class="flex items-center justify-between px-4 py-4 rounded-2xl text-lg font-bold text-slate-300 hover:text-white hover:bg-white/5 transition-all">
                    Inicio
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 5l7 7-7 7"/></svg>
                </a>
                <a href="/contacto" class="block w-full px-4 py-4 text-center rounded-2xl text-lg font-bold bg-gradient-to-r from-cyan-500 to-blue-600 text-white shadow-lg shadow-cyan-500/20 active:scale-[0.98] transition-all">
                    Iniciar Proyecto
                </a>
            </div>
        </div>
    </nav>

    <script>
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 20) {
                nav.classList.add('bg-slate-950/80', 'backdrop-blur-lg', 'border-b', 'border-white/5', 'h-20');
                nav.querySelector('.h-24').classList.replace('h-24', 'h-20');
            } else {
                nav.classList.remove('bg-slate-950/80', 'backdrop-blur-lg', 'border-b', 'border-white/5', 'h-20');
                nav.querySelector('.h-20')?.classList.replace('h-20', 'h-24');
            }
        });
    </script>

    <div class="h-20"></div>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-white/10 bg-slate-950/50 mt-20">
        <div class="max-w-7xl mx-auto px-4 py-12 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <p class="text-slate-400 text-sm">&copy; 2026 Joel Pinto. Todos los derechos reservados.</p>
                <p class="text-slate-500 text-xs mt-1">El Alto, Bolivia</p>
            </div>
            <div class="flex space-x-6">
                <a href="https://github.com/JhoeJhl" target="_blank" class="text-slate-400 hover:text-cyan-400 transition">
                    <span class="sr-only">GitHub</span>
                    <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"/></svg>
                </a>
            </div>
        </div>
    </footer>

    <script>
        const btn = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('mobile-menu');
        const icon = document.getElementById('menu-icon');

        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
            if (menu.classList.contains('hidden')) {
                icon.setAttribute('d', 'M4 6h16M4 12h16M4 18h16');
            } else {
                icon.setAttribute('d', 'M6 18L18 6M6 6l12 12');
            }
        });
    </script>
</body>
</html>
