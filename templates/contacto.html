{% extends "layout.html" %}

{% block content %}
<section class="py-12 md:py-24 relative overflow-hidden">
    <div class="absolute -left-40 top-20 w-[400px] h-[400px] bg-cyan-500/10 rounded-full blur-[100px] -z-10 pointer-events-none"></div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
            
            <div>
                <h2 class="text-4xl md:text-5xl font-extrabold text-white mb-6 tracking-tight">Hablemos sobre tu próximo <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">proyecto.</span></h2>
                <p class="text-slate-400 text-lg mb-10 leading-relaxed">
                    Si tienes una idea o un proyecto en mente, no dudes en contactarme. Responderé lo antes posible a través de WhatsApp.
                </p>

                <div class="space-y-8">
                    <div class="flex items-start">
                        <div class="flex-shrink-0 w-12 h-12 bg-slate-900 border border-white/10 rounded-xl flex items-center justify-center text-green-400">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.889-9.886.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.438-9.89 9.886-.001 2.15.633 3.567 1.615 5.113l-.982 3.589 3.857-.999zm11.366-7.327c-.314-.157-1.855-.916-2.144-1.022-.289-.105-.499-.157-.709.157-.21.314-.813 1.022-1.001 1.232-.188.21-.376.237-.69.081-.314-.157-1.325-.488-2.522-1.556-.931-.83-1.559-1.855-1.741-2.169-.183-.314-.02-.485.137-.641.142-.14.314-.367.472-.551.157-.184.21-.314.314-.525.105-.21.052-.394-.026-.551-.079-.157-.709-1.708-.971-2.338-.254-.613-.512-.529-.709-.538-.183-.01-.393-.01-.603-.01-.21 0-.551.079-.84.394-.289.314-1.001 1.022-1.001 2.494 0 1.472 1.074 2.89 1.221 3.08.147.19 2.112 3.226 5.116 4.526.714.309 1.271.494 1.706.633.717.227 1.371.195 1.887.118.575-.085 1.855-.759 2.118-1.494.262-.734.262-1.366.184-1.494-.079-.129-.289-.21-.603-.367z"/></svg>
                        </div>
                        <div class="ml-6">
                            <h4 class="text-white font-semibold text-lg">WhatsApp</h4>
                            <p class="text-slate-400">Respuesta inmediata</p>
                        </div>
                    </div>
                    
                    <div class="flex items-start">
                        <div class="flex-shrink-0 w-12 h-12 bg-slate-900 border border-white/10 rounded-xl flex items-center justify-center text-cyan-400">
                            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </div>
                        <div class="ml-6">
                            <h4 class="text-white font-semibold text-lg">Ubicación</h4>
                            <p class="text-slate-400">El Alto, Bolivia</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900/50 backdrop-blur-md border border-white/10 p-8 rounded-3xl shadow-2xl">
                <form id="whatsappForm" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="nombre" class="block text-sm font-medium text-slate-300 mb-2">Nombre completo</label>
                            <input type="text" id="nombre" name="nombre" class="w-full bg-slate-950/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-all" placeholder="Juan Pérez" required>
                        </div>
                        <div>
                            <label for="asunto" class="block text-sm font-medium text-slate-300 mb-2">Asunto</label>
                            <input type="text" id="asunto" name="asunto" class="w-full bg-slate-950/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-all" placeholder="Cotización de página web" required>
                        </div>
                    </div>

                    <div>
                        <label for="mensaje" class="block text-sm font-medium text-slate-300 mb-2">Tu mensaje</label>
                        <textarea id="mensaje" name="mensaje" rows="5" class="w-full bg-slate-950/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-all resize-none" placeholder="Hola Joel, me gustaría hablar contigo sobre..." required></textarea>
                    </div>

                    <button type="submit" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-500 focus:outline-none focus:ring-2 focus:ring-green-400 transition-all transform hover:-translate-y-0.5 shadow-lg shadow-green-500/25 flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.889-9.886.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.438-9.89 9.886-.001 2.15.633 3.567 1.615 5.113l-.982 3.589 3.857-.999zm11.366-7.327c-.314-.157-1.855-.916-2.144-1.022-.289-.105-.499-.157-.709.157-.21.314-.813 1.022-1.001 1.232-.188.21-.376.237-.69.081-.314-.157-1.325-.488-2.522-1.556-.931-.83-1.559-1.855-1.741-2.169-.183-.314-.02-.485.137-.641.142-.14.314-.367.472-.551.157-.184.21-.314.314-.525.105-.21.052-.394-.026-.551-.079-.157-.709-1.708-.971-2.338-.254-.613-.512-.529-.709-.538-.183-.01-.393-.01-.603-.01-.21 0-.551.079-.84.394-.289.314-1.001 1.022-1.001 2.494 0 1.472 1.074 2.89 1.221 3.08.147.19 2.112 3.226 5.116 4.526.714.309 1.271.494 1.706.633.717.227 1.371.195 1.887.118.575-.085 1.855-.759 2.118-1.494.262-.734.262-1.366.184-1.494-.079-.129-.289-.21-.603-.367z"/></svg>
                        Contactar por WhatsApp
                    </button>
                </form>
            </div>

        </div>
    </div>
</section>

<script>
    document.getElementById('whatsappForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const nombre = document.getElementById('nombre').value;
        const asunto = document.getElementById('asunto').value;
        const mensaje = document.getElementById('mensaje').value;
        
        // Reemplaza con tu número de teléfono real (incluyendo código de país sin el +)
        const telefono = "591XXXXXX"; 
        
        const texto = `Hola Joel, mi nombre es *${nombre}*.\n\n*Asunto:* ${asunto}\n*Mensaje:* ${mensaje}`;
        const url = `https://wa.me/${telefono}?text=${encodeURIComponent(texto)}`;
        
        window.open(url, '_blank');
    });
</script>
{% endblock %}
